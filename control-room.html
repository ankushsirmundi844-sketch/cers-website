<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Control Room - City Emergency Response System</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.css" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body class="bg-dark">
  <nav class="navbar navbar-expand-lg navbar-dark sticky-top" style="background: linear-gradient(90deg, #0d1b2a 0%, #1a2633 100%);">
    <div class="container-fluid">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-shield-alt me-2"></i><strong>City Emergency Response</strong>
      </a>
      <div class="ms-auto">
        <span class="badge bg-danger me-3"><i class="fas fa-dot-circle me-1"></i>LIVE</span>
        <a href="index.html" class="btn btn-outline-light btn-sm me-2">Home</a>
        <a href="report.html" class="btn btn-outline-danger btn-sm">Report Emergency</a>
      </div>
    </div>
  </nav>

  <div class="container-fluid py-3">
    <!-- Top Stats -->
    <div class="row g-3 mb-4">
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon danger"><i class="fas fa-exclamation-circle"></i></div>
          <div>
            <h6>Active Reports</h6>
            <h3 id="activeReports">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon success"><i class="fas fa-check-circle"></i></div>
          <div>
            <h6>Resolved</h6>
            <h3 id="resolvedReports">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon info"><i class="fas fa-ambulance"></i></div>
          <div>
            <h6>Units Deployed</h6>
            <h3 id="deployedUnits">0</h3>
          </div>
        </div>
      </div>
      <div class="col-md-3">
        <div class="stat-card">
          <div class="stat-icon warning"><i class="fas fa-clock"></i></div>
          <div>
            <h6>Avg Response Time</h6>
            <h3 id="avgResponse">2.5m</h3>
          </div>
        </div>
      </div>
    </div>

    <div class="row g-3">
      <!-- Main Map -->
      <div class="col-lg-8">
        <div class="card shadow-lg h-100 bg-dark text-white border-secondary">
          <div class="card-header bg-dark border-secondary">
            <div class="d-flex justify-content-between align-items-center">
              <h5 class="mb-0"><i class="fas fa-map me-2"></i>Live Incident Map</h5>
              <div>
                <button class="btn btn-sm btn-outline-light me-2" id="refreshMap">
                  <i class="fas fa-sync"></i> Refresh
                </button>
                <button class="btn btn-sm btn-outline-danger" id="clearMap">
                  <i class="fas fa-trash"></i> Clear
                </button>
              </div>
            </div>
          </div>
          <div class="card-body p-0">
            <div id="controlMap" class="map-control"></div>
          </div>
        </div>
      </div>

      <!-- Right Panel: Reports & Actions -->
      <div class="col-lg-4">
        <!-- Active Reports -->
        <div class="card shadow-lg mb-3 bg-dark text-white border-secondary">
          <div class="card-header bg-dark border-secondary">
            <h5 class="mb-0"><i class="fas fa-list me-2"></i>Active Incidents</h5>
          </div>
          <div class="card-body p-0" style="max-height: 400px; overflow-y: auto;">
            <div id="incidentsList"></div>
          </div>
        </div>

        <!-- Department Status -->
        <div class="card shadow-lg bg-dark text-white border-secondary">
          <div class="card-header bg-dark border-secondary">
            <h5 class="mb-0"><i class="fas fa-sitemap me-2"></i>Department Status</h5>
          </div>
          <div class="card-body p-0">
            <div id="departmentStatus"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Charts Row -->
    <div class="row g-3 mt-4 mb-4">
      <div class="col-md-6">
        <div class="card shadow-lg bg-dark text-white border-secondary">
          <div class="card-header bg-dark border-secondary">
            <h5 class="mb-0"><i class="fas fa-chart-pie me-2"></i>Incident Distribution</h5>
          </div>
          <div class="card-body">
            <canvas id="incidentChart"></canvas>
          </div>
        </div>
      </div>
      <div class="col-md-6">
        <div class="card shadow-lg bg-dark text-white border-secondary">
          <div class="card-header bg-dark border-secondary">
            <h5 class="mb-0"><i class="fas fa-chart-bar me-2"></i>Response Times</h5>
          </div>
          <div class="card-body">
            <canvas id="responseChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
  <script src="js/control-room.js"></script>
</body>
</html>
